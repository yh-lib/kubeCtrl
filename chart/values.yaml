# 应用程序配置
app:
  # 后端服务
  - name: ks-server
    deployment:
      name: "dp-ks-server"
      image: crpi-o5e9g8vha41iltg8.cn-hangzhou.personal.cr.aliyuncs.com/ks_img/ks-server:latest
      podAnnotations: {}
      podLabels: {}
      podSecurityContext: {}
      livenessProbe:
        tcpSocket:
          port: 80
      readinessProbe:
        tcpSocket:
          port: 80        
      resources: {}
      env:
        - name: TZ
          value: Asia/Shanghai
        - name: LANG
          value: C.UTF-8
        - name: GIN_MODE
          value: release
        - name: LOG_LEVEL
          value: info
        - name: USERNAME
          value: Admin
        - name: PASSWORD
          value: Admin123
        - name: INCLUSTER
          value: "true"
        - name: METADATA_NAMESPACE
          value: ks
        - name: PORT
          value: ":80"
    service:
      enabled: true
      name: "svc-ks-server"
      type: ClusterIP
      port: 80
  # 前端服务        
  - name: ks-web
    deployment:
      name: "dp-ks-web"
      image: crpi-o5e9g8vha41iltg8.cn-hangzhou.personal.cr.aliyuncs.com/ks_img/ks-web:v1.0
      podAnnotations: {}
      podLabels: {}
      podSecurityContext: {}
      livenessProbe:
        tcpSocket:
          port: 80        
      readinessProbe:
        tcpSocket:
          port: 80        
      resources: {}
      env:
        - name: TZ
          value: Asia/Shanghai
        - name: LANG
          value: C.UTF-8      
    service:
      enabled: true
      name: "svc-ks-web"
      type: ClusterIP
      port: 80
# 全局配置
global:
  replicaCount: 1
  image:
    pullPolicy: Always
  imagePullSecrets: []
  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: "sa-ks"
  nodeSelector: {}
  tolerations: []
  affinity: {}
  roleBinding:
    name: "rb-ks"
    create: true
  ingress:
    name: "ingress-ks"
    enabled: true
    className: "nginx"
    annotations: {}
    host: ks.tpass.local
    paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: svc-ks-web
            port:
              number: 80
      - path: /api
        pathType: ImplementationSpecific
        backend:
          service:
            name: svc-ks-server
            port:
              number: 80
    tls: []
