{{- range .Values.app}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .service.name }}
  namespace: {{$.Release.Namespace}}
  labels:
    dpName: {{.deployment.name}}
    {{- include "ks.labels" $ | nindent 4 }}
spec:
  type: {{ .service.type }}
  ports:
    - port: {{ .service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    dpName: {{.deployment.name}}
    {{- include "ks.labels" $ | nindent 4 }}
{{- end }}
